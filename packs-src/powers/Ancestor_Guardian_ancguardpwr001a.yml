_id: ancguardpwr001a
name: Ancestor Guardian
type: power
img: icons/magic/death/undead-ghost-scream-teal.webp
system:
  slug: ancestor-guardian
  source: Rules Compendium
  prose:
    description: |-
      <p>Each Dunmer is capable of invoking a guardian spirit of one of their ancestors and can, through the use of the Cast Magic action, bring that spirit into the Mundus to aid them. The spirit counts as a ghost (see the Inhabitants of Tamriel supplement) which, if killed, is sent back to whence it came. The caster and their allies do not suffer fear effects from an ancestor guardian. Otherwise, the spirit persists until 30 minutes pass or until the end of a Combat Encounter that it participates in, whichever comes first. This power may only be used once until after the character's next long rest.</p>
      <p>The GM should remember for roleplaying purposes that spirits are capable of communicating with mortals, and that Dunmer are likely to know the name of their own ancestral spirit. The GM should also feel free to customize the profile of the spirit beyond that of a generic ghost.</p>
    flavorText: ''
    notes: ''
