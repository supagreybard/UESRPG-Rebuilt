name: uesrpg-rebuilt
services:
  foundry-devserver:
    image: node:alpine
    working_dir: /app/foundryvtt
    environment:
      - NODE_ENV=production
    volumes:
      - ./dev-server/foundryvtt:/app/foundryvtt
      - ./dev-server/foundrydata:/data/foundry
      - ./dist:/data/foundry/Data/systems/uesrpg-rebuilt
    ports:
      - '30001:30000'
    command: node main.js --dataPath=/data/foundry
